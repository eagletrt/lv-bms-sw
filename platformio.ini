[platformio]
src_dir = .
include_dir = .
default_envs = release
  
[env:release]
platform = ststm32
upload_protocol = stlink
debug_tool = stlink
platform_packages = 
  toolchain-gccarmnoneeabi@=1.140201.0
monitor_speed = 115200
extra_scripts = pre:scripts/build_script.py

board = nucleo_c092rc
board_build.ldscript = STM32C092XX_FLASH.ld

build_flags = 
    -DUSE_HAL_DRIVER
    -Werror
    -ICore/Inc
    -ICore/Inc/bms/
    -ICore/Inc/common/
    -IDrivers/CMSIS/Include/
    -IDrivers/STM32C0xx_HAL_Driver/Inc/
    -IDrivers/STM32H7xx_HAL_Driver/Inc/Legacy/
    -IDrivers/CMSIS/Device/ST/STM32C0xx/Include/
build_src_filter =
    +<Core/Src/>
    +<Drivers/STM32C0xx_HAL_Driver/Src/>
    -<Drivers/STM32C0xx_HAL_Driver/Src/*_template.c>
    +<./startup_stm32c092xx.s>
lib_deps =
    https://github.com/eagletrt/libeagletrt-sw#v0.1.0
    # https://github.com/eagletrt/libspec-sw#v1.0.0

check_tool = clangtidy
check_flags =
    clangtidy: --checks=-*,cert-*,clang-analyzer-*,bugprone-*,performance-*,readability-*
    clangtidy: --warnings-as-errors=clang-analyzer-*,bugprone-*
    clangtidy: --header-filter=^.*Core/(Inc|Src)/.+/[^/]+\.(c|h)$
    clangtidy: --system-headers=false
check_src_filters =
    -<**>
    +<Core/Src/**>
    +<Core/Inc/**>

[env:tests]
platform = native
test_framework = unity
test_build_src = true
build_flags =
    -DEAGLETRT_STATIC= 
    -DEAGLETRT_STATIC_INLINE=
    -ICore/Inc/bms/
    -ICore/Inc/common/
build_src_filter =
    +<Core/Src/bms/>
lib_deps =
    https://github.com/eagletrt/libeagletrt-sw#v0.1.0
